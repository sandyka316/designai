version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: designai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: designai
      POSTGRES_PASSWORD: designai_secret
      POSTGRES_DB: designai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U designai -d designai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: designai_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
